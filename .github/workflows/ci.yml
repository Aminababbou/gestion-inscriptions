name: CI-CD Pipeline

on:
  push:
    branches: [ "main", "feature/nouvelle-fonction" ]
  pull_request:
    branches: [ "main", "feature/nouvelle-fonction" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inscription_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, intl, zip
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit tests
        # On force PHPUnit à tester le dossier "tests" s'il existe, sinon on ne plante pas
        run: |
          if [ -d "tests" ]; then
            php vendor/bin/phpunit tests --colors=always
          else
            echo "Pas de dossier tests trouvé, skip."
          fi
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: inscription_test
          DB_USERNAME: root
          DB_PASSWORD: root
