name: CI/CD Pipeline
on:
 push:
 branches: [ main ]
 pull_request:
 branches: [ main ]
jobs:
 build-and-test:
 runs-on: ubuntu-latest 
 services:
 mysql:
 image: mysql:8.0
 env:
 MYSQL_ROOT_PASSWORD: root
 MYSQL_DATABASE: inscription_test
 ports:
 - 3306:3306
 options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --hea
lth-retries=3
 steps:
 - name: Checkout code
 uses: actions/checkout@v4
 - name: Setup PHP
 uses: shivammathur/setup-php@v2
 with:
 php-version: '8.2'
 extensions: mbstring, pdo_mysql, intl, zip, opcache
 coverage: xdebug
 - name: Cache Composer dependencies
 uses: actions/cache@v3
 with:
 path: vendor
 key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
 restore-keys: |
 ${{ runner.os }}-php-
 - name: Install dependencies
 run: composer install --prefer-dist --no-progress
 - name: Run database migrations (if any)
 run: |
 php artisan migrate --env=testing
 env:
 DB_CONNECTION: mysql
 DB_HOST: 127.0.0.1
 DB_PORT: 3306
 DB_DATABASE: inscription_test
 DB_USERNAME: root
 DB_PASSWORD: root
 - name: Run PHPUnit tests
 run: vendor/bin/phpunit
 env:
 DB_CONNECTION: mysql
 DB_HOST: 127.0.0.1
 DB_PORT: 3306
 DB_DATABASE: inscription_test
 DB_USERNAME: root
 DB_PASSWORD: root
 # Optionnel : analyse statique du code
 - name: Run PHPStan
 run: vendor/bin/phpstan analyse src --level=5
 deploy:
 runs-on: ubuntu-latest
 needs: build-and-test
 if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 steps:
 - name: Checkout code
 uses: actions/checkout@v4
 # Exemple de déploiement via FTP
 - name: Deploy to production server
 uses: SamKirkland/FTP-Deploy-Action@v4.3.4 
with:
 server: ${{ secrets.FTP_SERVER }}
 username: ${{ secrets.FTP_USERNAME }}
 password: ${{ secrets.FTP_PASSWORD }}
 local-dir: ./
 server-dir: /public_html/